<ion-menu contentId="main-content" type="overlay" class="admin-sidebar">
  <ion-content>
    <aside class="sidebar-shell">
      <a class="brand" routerLink="/admin/dashboard" aria-label="The Mona Travel admin">
        <img
          src="/assets/images/home/logo-main-light-e1739937233975.png"
          alt="footer background"
        />
      </a>

      <nav class="sidebar-nav" aria-label="Admin navigation">
        <ion-menu-toggle auto-hide="false">
          <ion-list lines="none">
            <ion-item
              routerLink="/admin/dashboard"
              routerLinkActive="selected"
              [routerLinkActiveOptions]="{ exact: true }"
              [detail]="false"
            >
              <ion-icon name="home" slot="start" aria-hidden="true"></ion-icon>
              <ion-label>Dashboard</ion-label>
            </ion-item>

            <!-- Quản lý tour -->

            <ion-item
              class="menu-parent"
              routerLink="/admin/tours"
              routerLinkActive="selected"
              [routerLinkActiveOptions]="{ exact: false }"
              [detail]="false">

              <ion-icon
                name="briefcase-outline"
                slot="start"
                aria-hidden="true">
              </ion-icon>

              <ion-label>
                Quản lý tour
              </ion-label>

            </ion-item>

            <!-- Menu con -->

            <ion-item
              class="submenu-item"
              routerLink="/admin/tours"
              routerLinkActive="selected"
              [routerLinkActiveOptions]="{ exact: true }">

              <ion-icon
                name="ellipse"
                slot="start"
                aria-hidden="true">
              </ion-icon>

              <ion-label>
                Danh sách tour
              </ion-label>

            </ion-item>

            <ion-item
              class="submenu-item"
              routerLink="/admin/tours/add"
              routerLinkActive="selected"
              [routerLinkActiveOptions]="{ exact: true }">

              <ion-icon
                name="add"
                slot="start"
                aria-hidden="true">
              </ion-icon>

              <ion-label>
                Thêm tour
              </ion-label>

            </ion-item>

            <ion-item
              class="submenu-item"
              routerLink="/admin/tour-categories"
              routerLinkActive="selected"
              [routerLinkActiveOptions]="{ exact: true }">

              <ion-icon
                name="pricetag-outline"
                slot="start"
                aria-hidden="true">
              </ion-icon>

              <ion-label>
                Danh mục tour
              </ion-label>

            </ion-item>

            <ion-item routerLink="/admin/news" routerLinkActive="selected" [detail]="false">
              <ion-icon name="newspaper-outline" slot="start" aria-hidden="true"></ion-icon>
              <ion-label>Tin t&#7913;c</ion-label>
            </ion-item>

            <ion-item routerLink="/admin/users" routerLinkActive="selected" [detail]="false">
              <ion-icon name="people" slot="start" aria-hidden="true"></ion-icon>
              <ion-label>Ng&#432;&#7901;i d&#249;ng</ion-label>
            </ion-item>

            <ion-item routerLink="/admin/bookings" routerLinkActive="selected" [detail]="false">
              <ion-icon name="calendar-outline" slot="start" aria-hidden="true"></ion-icon>
              <ion-label>&#272;&#7863;t tour (Booking)</ion-label>
            </ion-item>
          </ion-list>
        </ion-menu-toggle>
      </nav>

      <div class="sidebar-divider" aria-hidden="true"></div>

      <nav class="sidebar-nav sidebar-nav-secondary" aria-label="Admin actions">
        <ion-menu-toggle auto-hide="false">
          <ion-list lines="none">
            <ion-item [button]="true"
                      [detail]="false">
              <ion-icon name="settings" slot="start" aria-hidden="true"></ion-icon>
              <ion-label>C&#224;i &#273;&#7863;t</ion-label>
              <ion-icon name="chevron-forward-outline" slot="end" aria-hidden="true"></ion-icon>
            </ion-item>

            <ion-item routerLink="/login" [detail]="false">
              <ion-icon name="log-out-outline" slot="start" aria-hidden="true"></ion-icon>
              <ion-label>&#272;&#259;ng xu&#7845;t</ion-label>
            </ion-item>
          </ion-list>
        </ion-menu-toggle>
      </nav>
    </aside>
  </ion-content>
</ion-menu>
