<article class="table-card">
  <header class="table-header">
    <h2>Tour xem nhiều nhất</h2>
    <a routerLink="/admin/tours">Xem tất cả</a>
  </header>

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Tour</th>
          <th>&#272;&#227; &#273;&#7863;t</th>
          <th>Doanh thu</th>
        </tr>
      </thead>
      <tbody>
        @for (tour of tours; track tour.title; let index = $index) {
          <tr>
            <td>{{ index + 1 }}</td>
            <td>
              <div class="tour-cell">
                <img [src]="tour.imageUrl" [alt]="tour.title" />
                <span>{{ tour.title }}</span>
              </div>
            </td>
            <td>{{ tour.bookings }}</td>
            <td>{{ tour.revenue }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</article>
