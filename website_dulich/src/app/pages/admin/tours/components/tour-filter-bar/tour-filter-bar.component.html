<div class="filter-card">

  <div class="filter-grid">

    <!-- Search -->
    <div class="search-box">
      <ion-icon name="search-outline"></ion-icon>

      <input
        type="text"
        [(ngModel)]="query.keyword"
        placeholder="Tìm theo tên tour hoặc địa điểm"
        (keyup.enter)="applyFilter()">
    </div>

    <!-- Trạng thái -->
    <select
      class="filter-select"
      [(ngModel)]="query.isActive">

      <option [ngValue]="null"
              disabled
              hidden>
        Trạng thái
      </option>

      <option [ngValue]="true">
        Đang mở bán
      </option>

      <option [ngValue]="false">
        Ngừng bán
      </option>

    </select>

    <!-- Sắp xếp -->
    <select
      class="filter-select"
      [(ngModel)]="query.sort">

      <option value=""
              disabled
              hidden>
        Sắp xếp
      </option>

      <option value="newest">
        Mới nhất
      </option>

      <option value="oldest">
        Cũ nhất
      </option>

      <option value="priceAsc">
        Giá tăng dần
      </option>

      <option value="priceDesc">
        Giá giảm dần
      </option>

    </select>

    <!-- Button -->
    <button class="btn-filter"
            type="button"
            (click)="applyFilter()">
      <ion-icon name="filter-outline"></ion-icon>
      <span>Lọc</span>
    </button>

    <button class="btn-reset"
            type="button"
            (click)="resetFilter()">
      <ion-icon name="refresh-outline"></ion-icon>
      <span>Đặt lại</span>
    </button>

  </div>

</div>
