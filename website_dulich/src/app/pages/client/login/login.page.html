<ion-content class="login-content">
  <div class="login-container">
    <div class="login-card">

      <!-- Left Column -->
      <div class="left-column">
        <img src="../../../../assets/images/banner_register.png" alt="Login banner" />
      </div>

      <!-- Right Column -->
      <div class="right-column">
        <div class="form-wrapper">

          <h1 class="form-title">Đăng nhập</h1>
          <p class="form-subtitle">
            Vui lòng đăng nhập để tiếp tục sử dụng hệ thống
          </p>

          <form (ngSubmit)="login()">

            <div class="form-group">
              <ion-label>Email</ion-label>
              <ion-input
                name="email"
                [(ngModel)]="loginData.email"
                placeholder="Nhập email đăng nhập">
              </ion-input>

              <div
                class="error-message"
                *ngIf="validationErrors['Email']">

                {{ validationErrors['Email'] }}

              </div>
            </div>

            <div class="form-group">
              <div class="label-row">
                <ion-label>Mật khẩu</ion-label>

                <a class="forgot-password" (click)="goToForgotPassword()">
                  Quên mật khẩu?
                </a>
              </div>

              <ion-input
                name="password"
                [(ngModel)]="loginData.password"
                type="password"
                placeholder="Nhập mật khẩu">
              </ion-input>

              <div
                class="error-message"
                *ngIf="validationErrors['Password']">

                {{ validationErrors['Password'] }}

              </div>
            </div>

            <ion-button
              expand="block"
              class="submit-btn"
              type="submit"
              [disabled]="isLoading">

              {{ isLoading ? 'Đang đăng nhập...' : 'Đăng nhập' }}

            </ion-button>
            <div
              class="server-error"
              *ngIf="errorMessage">

              {{ errorMessage }}

            </div>

            <div class="divider">
              <span>hoặc</span>
            </div>

            <div class="login-link">
              Chưa có tài khoản?
              <a (click)="goToRegister()">Đăng ký ngay</a>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</ion-content>
