<ion-content class="forgot-password-content">
  <div class="forgot-password-container">
    <div class="forgot-password-card">

      <div class="left-column">
        <img src="../../../../assets/images/banner_register.png" alt="Forgot Password" />
      </div>

      <div class="right-column">
        <div class="form-wrapper">

          <h1 class="form-title">Quên mật khẩu</h1>

          <p class="form-subtitle">
            Nhập email đã đăng ký để nhận liên kết đặt lại mật khẩu.
          </p>

          <form (ngSubmit)="forgotPassword()">

            <div class="form-group">
              <ion-label>Email</ion-label>
              <ion-input
                name="email"
                [(ngModel)]="forgotPasswordData.email"
                type="email"
                placeholder="Nhập email của bạn">
              </ion-input>

              <div
                class="error-message"
                *ngIf="validationErrors['Email']">

                {{ validationErrors['Email'] }}

              </div>
            </div>

            <ion-button
              expand="block"
              class="submit-btn"
              type="submit"
              [disabled]="isLoading">

              {{ isLoading ? 'Đang gửi...' : 'Gửi liên kết' }}

            </ion-button>

            <div
              class="error-message"
              *ngIf="errorMessage">

              {{ errorMessage }}

            </div>

            <div class="login-link">
              Đã nhớ mật khẩu?
              <a (click)="goToLogin()">Đăng nhập ngay</a>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>

</ion-content>
