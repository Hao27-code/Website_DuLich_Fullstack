<div class="booking-backdrop">

  <div class="booking-modal">

    <!-- Header -->
    <div class="booking-header">

      <h2>Đặt Tour</h2>

      <button class="close-btn">
        ✕
      </button>

    </div>

    <!-- Step -->
    <div class="booking-stepper">

      <div class="step active">

        <div class="circle">
          1
        </div>

        <span>Chọn ngày</span>

      </div>

      <div class="line active"></div>

      <div class="step">

        <div class="circle">
          2
        </div>

        <span>Thông tin</span>

      </div>

      <div class="line"></div>

      <div class="step">

        <div class="circle">
          3
        </div>

        <span>Thanh toán</span>

      </div>

    </div>

    <!-- Content -->

    <div class="booking-body">

      <!-- Left -->

      <div class="booking-content">

        <div class="placeholder">

          <h3>
            Bước 1
          </h3>

          <p>
            Calendar sẽ được xây dựng ở phần tiếp theo.
          </p>

        </div>

      </div>

      <!-- Right -->

      <div class="booking-summary">

        <h3>
          Thông tin đặt tour
        </h3>

        <div class="summary-item">

          <span>Tour</span>

          <strong>Đà Lạt 3N2Đ</strong>

        </div>

        <div class="summary-item">

          <span>Giá</span>

          <strong>2.199.000đ</strong>

        </div>

        <div class="summary-item">

          <span>Ngày</span>

          <strong>Chưa chọn</strong>

        </div>

        <div class="summary-item">

          <span>Người lớn</span>

          <strong>1</strong>

        </div>

        <div class="summary-item">

          <span>Trẻ em</span>

          <strong>0</strong>

        </div>

        <hr>

        <div class="summary-total">

          <span>Tổng tiền</span>

          <strong>2.199.000đ</strong>

        </div>

      </div>

    </div>

    <!-- Footer -->

    <div class="booking-footer">

      <button class="btn-outline">

        Quay lại

      </button>

      <button class="btn-primary">

        Tiếp tục

      </button>

    </div>

  </div>

</div>
